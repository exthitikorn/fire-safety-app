<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ระบบตรวจสอบอุปกรณ์ดับเพลิง</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { padding-bottom: env(safe-area-inset-bottom, 0px); }
    iframe {
      width: 100vw;
      height: 100dvh;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <iframe id="app" allow="*"></iframe>
  <script>
    var BASE = 'https://script.google.com/macros/s/AKfycbzBbO1wvI7sPyQhoCxL4N_6bhdV5W9kWXQJqzFMZuV-mlLR7OyG5gr3XBK5lqPrgvhWeg/exec';
    var iframe = document.getElementById('app');

    function applyHash() {
      iframe.src = BASE + (window.location.hash || '');
    }

    window.addEventListener('hashchange', applyHash);
    applyHash();
  </script>
</body>
</html>
