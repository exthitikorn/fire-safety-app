<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ระบบตรวจสอบอุปกรณ์ดับเพลิง</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { padding-bottom: env(safe-area-inset-bottom, 0px); }
    iframe {
      width: 100vw;
      height: 100dvh;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <iframe id="app" allow="*"></iframe>
  <script>
    var BASE = 'https://script.google.com/macros/s/AKfycbyd8y_PUB95CiKbaOcsVfALoFDrwpzBpQNa3RNf0H_ck1SiEZD1vjuNuUKD5w7STpBP/exec';
    var VALID = {dashboard:1, inspection:1, history:1, master:1, settings:1};
    var iframe = document.getElementById('app');

    function applyHash() {
      var hash = window.location.hash.slice(1);
      iframe.src = BASE + (VALID[hash] ? '?view=' + hash : '');
    }

    window.addEventListener('hashchange', applyHash);
    applyHash();
  </script>
</body>
</html>
